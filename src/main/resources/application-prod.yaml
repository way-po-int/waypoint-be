spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 0
      idle-timeout: 300000 # 5분

cookie:
  secure: true
  same-site: None

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  health:
    db:
      enabled: false
  otlp:
    metrics:
      export:
        url: "${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/metrics"
        headers:
          Authorization: "${OTEL_EXPORTER_OTLP_AUTH}"
    tracing:
      endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/traces"
      headers:
        Authorization: "${OTEL_EXPORTER_OTLP_AUTH}"
    logging:
      endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/logs"
      headers:
        Authorization: "${OTEL_EXPORTER_OTLP_AUTH}"
  tracing:
    sampling:
      probability: ${SAMPLING_PROBABILITY:0.1}
